<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>呼吸練習 · 靜息</title>

  <!-- 距離感與安定感的字體：中文 Noto Serif TC、數字 Cormorant Garamond -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 背景：極光漂移 + 顆粒紋理 -->
  <div class="aurora" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <main class="stage">

    <!-- 畫面 1：引導（呼吸法由 Flex message 帶 ?type= 進入；開始/重新開始皆在此） -->
    <section id="screen-guide" class="screen">
      <p class="eyebrow">呼吸練習</p>
      <h2 class="guide-title" id="guide-title">4-7-8 呼吸法</h2>
      <p class="guide-sub" id="guide-sub"></p>

      <div class="orb-wrap">
        <div class="orb-halo" id="orb-halo"></div>
        <div class="orb" id="orb">
          <div class="orb-inner">
            <span class="phase-label" id="phase-label">準備</span>
            <span class="phase-count" id="phase-count">—</span>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn-primary" id="btn-start">開始</button>
        <div class="ctl-row" id="ctl-row">
          <button class="ctl" id="btn-pause" aria-label="暫停或繼續">暫停</button>
          <button class="ctl" id="btn-sound" aria-label="音效開關">♪ 音效</button>
          <button class="ctl" id="btn-stop" aria-label="結束">結束</button>
        </div>
      </div>
    </section>

    <!-- 畫面 2：完成（滿版） -->
    <section id="screen-done" class="screen">
      <div class="done-card">
        <div class="done-mark">🌿</div>
        <h2 class="done-title">完成</h2>
        <p class="done-sub">願你帶著這份平靜，繼續今天。</p>
        <button class="btn-primary" id="btn-again">再做一次</button>
        <button class="btn-ghost" id="btn-close">關閉</button>
      </div>
    </section>

  </main>

  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- 應用程式模組 -->
  <script src="js/patterns.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/breathing.js"></script>
  <script src="js/liff-init.js"></script>

  <!-- 介面接線（DOM × 引擎 × LIFF） -->
  <script>
    (function () {
      const screens = {
        guide: document.getElementById('screen-guide'),
        done: document.getElementById('screen-done'),
      };

      const el = {
        guideEl: document.getElementById('screen-guide'),
        guideTitle: document.getElementById('guide-title'),
        guideSub: document.getElementById('guide-sub'),
        orb: document.getElementById('orb'),
        halo: document.getElementById('orb-halo'),
        phaseLabel: document.getElementById('phase-label'),
        phaseCount: document.getElementById('phase-count'),
        btnStart: document.getElementById('btn-start'),
        btnPause: document.getElementById('btn-pause'),
        btnSound: document.getElementById('btn-sound'),
        btnStop: document.getElementById('btn-stop'),
        btnAgain: document.getElementById('btn-again'),
        btnClose: document.getElementById('btn-close'),
      };

      const audio = new window.BreathAudio();
      let engine = null;
      let currentType = window.DEFAULT_PATTERN;
      let currentScreen = null;

      // —— 上下滑動轉場 ——
      // dir='down'：目標從下方滑入（往下到完成頁）；dir='up'：目標從上方滑入（往上回引導頁）
      function activate(name, dir) {
        const target = screens[name];
        if (currentScreen === target) return;

        if (!currentScreen) {
          target.classList.add('is-active');
          currentScreen = target;
          return;
        }

        const prev = currentScreen;
        target.classList.remove('is-active', 'above', 'below');
        target.classList.add(dir === 'down' ? 'below' : 'above'); // 進場起點
        prev.classList.remove('is-active');
        prev.classList.add(dir === 'down' ? 'above' : 'below');    // 舊畫面退場方向

        requestAnimationFrame(() => requestAnimationFrame(() => {
          target.classList.remove('above', 'below');
          target.classList.add('is-active');
        }));
        currentScreen = target;
      }

      // —— 呼吸圈回到待機狀態 ——
      function setOrbIdle() {
        el.orb.classList.remove('paused');
        el.orb.style.transitionDuration = '0.6s';
        el.halo.style.transitionDuration = '0.6s';
        el.orb.style.transform = 'scale(0.5)';
        el.halo.style.transform = 'scale(0.62)';
        el.halo.style.opacity = '0.4';
        el.phaseLabel.textContent = '準備';
        el.phaseCount.textContent = '—';
      }

      // —— 載入某呼吸法到引導畫面（待機） ——
      function loadGuide(type) {
        currentType = type;
        const p = window.BREATHING_PATTERNS[type];
        el.guideTitle.textContent = p.name;
        const total = p.phases.reduce((a, ph) => a + ph.sec, 0) * p.cycles;
        const mins = Math.round(total / 60);
        el.guideSub.textContent = p.cycles + ' 個循環 · 約 ' + (mins < 1 ? '不到 1' : mins) + ' 分鐘';
        el.guideEl.classList.remove('running');
        el.btnStart.textContent = '開始';
        setOrbIdle();
      }

      // —— 開始 / 重新開始（同一顆按鈕） ——
      function startRun() {
        if (engine) engine.stop();
        const pattern = window.BREATHING_PATTERNS[currentType];

        el.guideEl.classList.add('running');
        el.btnStart.textContent = '重新開始';
        el.btnPause.textContent = '暫停';
        setOrbIdle(); // 讓第一次吸氣從小圈擴起

        engine = new window.BreathingEngine(pattern, {
          onPhaseStart(phase, cycleIndex, totalCycles) {
            el.guideSub.textContent = '第 ' + (cycleIndex + 1) + ' / ' + totalCycles + ' 循環';
            el.phaseLabel.textContent = phase.label;
            // 呼吸圈：轉場時間 = 該階段秒數，與引導同步
            el.orb.style.transitionDuration = phase.sec + 's';
            el.halo.style.transitionDuration = phase.sec + 's';
            el.orb.style.transform = 'scale(' + phase.scale + ')';
            el.halo.style.transform = 'scale(' + (phase.scale * 1.25) + ')';
            el.halo.style.opacity = phase.scale > 0.7 ? '0.9' : '0.45';
            audio.cue(phase.tone);
          },
          onTick(remainingSec) {
            el.phaseCount.textContent = remainingSec;
          },
          onComplete() {
            audio.cue(528, 1.2);
            finishToDone();
          },
        });
        engine.start();
      }

      function finishToDone() {
        el.guideEl.classList.remove('running');
        activate('done', 'down'); // 自動往下跳到完成頁
      }

      // —— 事件 ——
      el.btnStart.addEventListener('click', async () => {
        await audio.unlock(); // 必須在使用者手勢中啟動 AudioContext
        startRun();           // 第一次=開始；之後=重新開始
      });

      el.btnPause.addEventListener('click', () => {
        if (!engine) return;
        const paused = engine.togglePause();
        el.btnPause.textContent = paused ? '繼續' : '暫停';
        el.orb.classList.toggle('paused', paused);
      });

      el.btnSound.addEventListener('click', () => {
        audio.enabled = !audio.enabled;
        el.btnSound.classList.toggle('off', !audio.enabled);
        el.btnSound.textContent = audio.enabled ? '♪ 音效' : '♪ 靜音';
      });

      el.btnStop.addEventListener('click', () => {
        if (engine) engine.stop();
        finishToDone(); // 按結束 → 自動往下跳到完成頁
      });

      el.btnAgain.addEventListener('click', () => {
        loadGuide(currentType);   // 重置引導畫面，開始鈕回到「開始」
        activate('guide', 'up');  // 自動往上跳回引導畫面
      });

      el.btnClose.addEventListener('click', () => window.AppLiff.close());

      // —— 啟動 ——
      // 呼吸法由 Flex message 的 ?type= 決定，直接進入該呼吸法的引導畫面。
      // 未帶參數時（開發或直接開啟）退回預設呼吸法。
      (async function boot() {
        await window.AppLiff.init();
        currentType = window.AppLiff.getType();
        loadGuide(currentType);
        activate('guide');
      })();
    })();
  </script>
</body>
</html>
